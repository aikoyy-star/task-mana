<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASK</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1917;--text2:#6b6a65;--text3:#a09f9a;
  --accent:#2a5caa;--accent-bg:#e8eef8;
  --green:#1a7a52;--green-bg:#e4f3ec;
  --red:#b03a2e;--red-bg:#faeae8;
  --amber:#8a5c00;--amber-bg:#fdf3dc;
  --radius:10px;--radius-lg:14px;
  --sat-bg:rgba(59,130,246,0.10);--sun-bg:rgba(220,38,38,0.10);
  --sp-nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;flex-shrink:0;background:var(--surface);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
.topbar-logo{font-size:16px;font-weight:700;letter-spacing:-.02em}.topbar-logo span{color:var(--accent)}
.topbar-clock{display:flex;flex-direction:column;align-items:center}
.clock-date{font-size:13px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.clock-time{font-size:18px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace;line-height:1.1}
.tab-bar{flex-shrink:0;background:var(--surface);border-bottom:.5px solid var(--border);display:flex;padding:0 1.5rem}
.tab-btn{padding:8px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.statsbar{flex-shrink:0;background:var(--surface);border-bottom:.5px solid var(--border);display:flex;padding:0 1.5rem}
.stat-pill{display:flex;align-items:center;gap:8px;padding:6px 20px 6px 0;border-right:.5px solid var(--border);margin-right:20px}
.stat-pill:last-child{border-right:none}
.stat-pill-val{font-size:18px;font-weight:700;letter-spacing:-.04em;font-family:'DM Mono',monospace}
.stat-pill-lbl{font-size:10px;color:var(--text3)}
.stat-pill.red .stat-pill-val{color:var(--red)}.stat-pill.green .stat-pill-val{color:var(--green)}
.tab-view{display:none;flex:1;min-height:0;overflow:hidden}.tab-view.active{display:flex}
.workspace{display:grid;grid-template-columns:420px 1fr;min-height:0;flex:1;width:100%}
.pane-list{border-right:.5px solid var(--border);background:var(--bg);overflow-y:auto;padding:.75rem 1.25rem;display:flex;flex-direction:column;gap:0}
.pane-gantt{background:var(--surface);overflow:auto;padding:1rem 1.25rem}
.pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.pane-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.add-btn-top{margin-bottom:.75rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--text);color:#fff;width:100%;justify-content:center}
.btn-primary:hover{background:#333}
.btn-ghost{background:transparent;border:.5px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:none}
.btn-danger:hover{background:#f5d0cc}
.filter-bar{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap}
.filter-bar input{flex:1;min-width:100px;padding:5px 9px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit}
.filter-bar input:focus{outline:none;border-color:var(--accent)}
.filter-select{padding:5px 7px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer}
.group-block{margin-bottom:6px;border-radius:var(--radius-lg);overflow:hidden;border:1.5px solid var(--accent);background:var(--surface)}
.group-block.done-grp-block{border-color:var(--border2);opacity:.6}
.group-header{background:var(--accent-bg);padding:6px 8px;display:flex;align-items:center;gap:6px;transition:background .12s}
.group-header.has-overdue{background:var(--red-bg);border-left:3px solid var(--red)}
.group-header.done-grp{background:var(--surface2)}
.grp-toggle-btn{width:26px;height:26px;border-radius:6px;border:.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);flex-shrink:0;transition:background .12s}
.grp-toggle-btn:hover{background:var(--surface2)}
.group-edit-area{flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:1px}
.group-edit-area:hover .group-name{color:var(--accent)}
.group-name{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.group-header.done-grp .group-name{text-decoration:line-through;color:var(--text3)}
.group-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.group-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.urgent-badge{font-size:10px;font-weight:700;white-space:nowrap}
.group-actions{display:flex;gap:2px;flex-shrink:0}
.group-children{background:var(--surface);padding:6px 8px;border-top:1px solid rgba(42,92,170,.15);display:flex;flex-direction:column;gap:4px}
.group-add-btn{font-size:11px;color:var(--accent);background:none;border:.5px dashed var(--accent);border-radius:8px;padding:4px 10px;cursor:pointer;width:100%;text-align:center;margin-top:2px;transition:background .12s}
.group-add-btn:hover{background:var(--accent-bg)}
.task-list{display:flex;flex-direction:column;gap:5px}
.task-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:7px 8px;display:flex;align-items:stretch;gap:7px;transition:box-shadow .15s;animation:fadeIn .18s ease;cursor:pointer}
.task-card.child{border-radius:8px;background:#fafaf8;border-color:rgba(0,0,0,.06)}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);background:#fafaf8}
.task-card.done{opacity:.45}
.task-card.overdue{border-left:3px solid var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.task-deadline{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--accent-bg);border-radius:8px;padding:3px 2px;cursor:pointer}
.task-card.overdue .task-deadline{background:var(--red-bg)}
.task-card.done .task-deadline{background:var(--surface2)}
.dl-month{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace}
.dl-day{font-size:18px;font-weight:700;color:var(--accent);line-height:1.05;font-family:'DM Mono',monospace}
.dl-workdays{font-size:9px;color:var(--green);font-weight:700;font-family:'DM Mono',monospace;margin-top:1px}
.task-card.overdue .dl-month,.task-card.overdue .dl-day{color:var(--red)}
.task-card.overdue .dl-workdays{color:var(--red)}
.task-card.done .dl-month,.task-card.done .dl-day,.task-card.done .dl-workdays{color:var(--text3)}
.check-wrap{display:flex;align-items:center}
.check-btn{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.check-btn:hover{border-color:var(--green)}
.check-btn.checked{background:var(--green);border-color:var(--green)}
.checkmark{display:none;width:9px;height:9px}
.check-btn.checked .checkmark{display:block}
.task-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.task-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-card.done .task-name{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.badge{font-size:10px;padding:1px 6px;border-radius:999px;font-weight:500;white-space:nowrap}
.b-member{background:var(--green-bg);color:var(--green)}
.b-ph{background:var(--amber-bg);color:var(--amber)}
.b-pm{background:var(--accent-bg);color:var(--accent)}
.b-pl{background:var(--surface2);color:var(--text2)}
.b-memo{background:var(--surface2);color:var(--text2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-overdue{background:var(--red-bg);color:var(--red)}
.task-actions{display:flex;align-items:center}
.icon-btn{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.icon-btn.del:hover{background:var(--red-bg);color:var(--red)}
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;margin-top:.75rem;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:.5px;background:var(--border)}
.done-toggle{cursor:pointer;user-select:none}
.done-toggle .arrow{font-size:10px;transition:transform .2s}
.done-toggle.collapsed .arrow{transform:rotate(-90deg)}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px}
.empty-icon{font-size:26px;margin-bottom:6px}
/* gantt */
.gantt-scroll{overflow-x:auto;overflow-y:visible}
.gantt-name-col-h{flex-shrink:0;font-size:10px;color:var(--text3);padding:0 4px 4px 26px;display:flex;align-items:center}
.gantt-member-col-h{flex-shrink:0;font-size:10px;color:var(--text3);padding:0 4px 4px;display:flex;align-items:center}
.gantt-row{display:flex;align-items:center;border-radius:4px;transition:background .12s;user-select:none;position:relative}
.gantt-row:hover{background:var(--surface2)}
.gantt-row.dragging{opacity:.35}
.gantt-row.drag-over-top{box-shadow:0 -2px 0 var(--accent)}
.gantt-row.drag-over-bottom{box-shadow:0 2px 0 var(--accent)}
/* gantt group */
.gantt-group-wrap{margin-bottom:3px;border:1.5px solid var(--accent);border-radius:7px;overflow:hidden}
.gantt-group-wrap.grp-done{border-color:var(--border2);opacity:.7}
.gantt-group-hdr{display:flex;align-items:center;background:var(--accent-bg);border-radius:0;cursor:pointer;user-select:none}
.gantt-group-hdr:hover{background:#dce6f5}
.gantt-group-hdr.grp-overdue{background:var(--red-bg);border-left:3px solid var(--red)}
.gantt-group-body{background:var(--surface);border-top:1px solid rgba(42,92,170,.15);padding:2px 0 2px 18px;border-left:3px solid rgba(42,92,170,.25)}
.gantt-drag-handle{width:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;cursor:grab;align-self:stretch}
.gantt-drag-handle:active{cursor:grabbing}
.gantt-row-name{flex-shrink:0;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px;cursor:pointer;display:flex;align-items:center}
.gantt-row-name:hover{color:var(--accent);text-decoration:underline}
.gantt-row-name.done-text{text-decoration:line-through;color:var(--text3)}
.gantt-row-name.done-text:hover{color:var(--text3)}
.gantt-row-member{flex-shrink:0;font-size:10px;color:var(--text2);padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
.gantt-bar-area{position:relative;flex:none;overflow:hidden}
.gantt-bar{position:absolute;border-radius:4px;cursor:pointer;transition:filter .15s;display:flex;align-items:center;padding:0 6px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;font-weight:500}
.gantt-bar:hover{filter:brightness(.88)}
.today-vline{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:4;pointer-events:none}
.today-label{position:absolute;top:-18px;font-size:9px;color:var(--red);font-weight:700;transform:translateX(-50%);font-family:'DM Mono',monospace;white-space:nowrap}
.day-col{position:absolute;top:0;bottom:0;pointer-events:none}
.day-col.sat{background:var(--sat-bg)}.day-col.sun{background:var(--sun-bg)}
.day-label-row{position:relative;height:30px;border-bottom:.5px solid var(--border)}
.day-label{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:3px}
.day-label-text{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.day-label-text.sat{color:#2563eb}.day-label-text.sun{color:var(--red)}.day-label-text.today-lbl{font-weight:700;color:var(--red)}
.resize-handle{width:5px;flex-shrink:0;cursor:col-resize;background:transparent;border-left:.5px solid var(--border2);align-self:stretch;display:flex;align-items:center;justify-content:center;color:var(--border2);font-size:8px;transition:background .12s}
.resize-handle:hover{background:var(--accent-bg)}

/* 追加：上部スクロールバーのデザイン */
#gantt-top-scroll::-webkit-scrollbar {height: 8px;}
#gantt-top-scroll::-webkit-scrollbar-track {background: var(--bg); border-radius: 10px;}
#gantt-top-scroll::-webkit-scrollbar-thumb {background: var(--border2); border-radius: 10px;}
#gantt-top-scroll::-webkit-scrollbar-thumb:hover {background: var(--text3);}

/* calendar */
.cal-view{flex:1;overflow:auto;padding:1.25rem 1.5rem;background:var(--bg)}
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.cal-nav{background:none;border:.5px solid var(--border2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit}
.cal-nav:hover{background:var(--surface2)}
.cal-title{font-size:16px;font-weight:700;min-width:120px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-day-header{background:var(--surface);text-align:center;padding:6px 2px;font-size:11px;font-weight:700;color:var(--text2)}
.cal-day-header.sun{color:var(--red)}.cal-day-header.sat{color:#2563eb}
.cal-cell{background:var(--surface);min-height:90px;padding:4px;vertical-align:top}
.cal-cell.other-month{background:#f9f8f5;opacity:.6}
.cal-cell.today-cell{background:#fff8f0}
.cal-cell.sat-cell{background:#f0f4ff}.cal-cell.sun-cell,.cal-cell.hol-cell{background:#fff0f0}
.cal-date-num{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today-cell .cal-date-num{background:var(--red);color:#fff}
.cal-cell.sat-cell .cal-date-num{color:#2563eb}
.cal-cell.sun-cell .cal-date-num,.cal-cell.hol-cell .cal-date-num{color:var(--red)}
.cal-task-chip{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer;font-weight:500}
.cal-task-chip:hover{filter:brightness(.88)}
.cal-hol-label{font-size:9px;color:var(--red);margin-bottom:2px;font-weight:500}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,18,14,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);padding:1.5rem;width:100%;max-width:500px;box-shadow:0 8px 40px rgba(0,0,0,.18);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-header h2{font-size:16px;font-weight:700}
.form-group{margin-bottom:11px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.group-toggle-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border-radius:var(--radius);margin-bottom:11px;border:.5px solid var(--border2)}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:11px;cursor:pointer;transition:background .2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-label{font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;user-select:none}
.toggle-label.active{color:var(--accent)}
.pw-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.pw-card{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:1rem}
.pw-logo{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem}
.pw-logo span{color:var(--accent)}
.pw-label{font-size:13px;color:var(--text2);align-self:flex-start}
.pw-input{width:100%;padding:10px 14px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;letter-spacing:.1em;transition:border-color .15s}
.pw-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.pw-btn{width:100%;padding:10px;border-radius:var(--radius);border:none;background:var(--text);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.pw-btn:hover{background:#333}
.pw-error{font-size:12px;color:var(--red);min-height:16px}
.pw-note{font-size:11px;color:var(--text3);text-align:center;line-height:1.6}
.memo-view{flex:1;overflow-y:auto;padding:1rem 1.5rem;background:var(--bg);display:flex;flex-direction:column;gap:0}
.memo-add-area{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);padding:1rem;margin-bottom:1rem}
.memo-add-area textarea{width:100%;padding:8px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:72px;transition:border-color .15s}
.memo-add-area textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.memo-add-footer{display:flex;justify-content:flex-end;margin-top:8px}
.memo-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;display:flex;align-items:flex-start;gap:8px;animation:fadeIn .18s ease;transition:opacity .2s}
.memo-card.done-memo{opacity:.4}
.memo-text{flex:1;font-size:13px;color:var(--text);line-height:1.65;white-space:pre-wrap;word-break:break-all;cursor:pointer}
.memo-card.done-memo .memo-text{text-decoration:line-through;color:var(--text3)}
.memo-actions{display:flex;gap:3px;flex-shrink:0}
.memo-to-task-btn{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--accent-bg);color:var(--accent);border:none;cursor:pointer;font-weight:500;white-space:nowrap;transition:background .12s}
.memo-to-task-btn:hover{background:#d0dff5}
.cal-done-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-left:auto}
.cal-cell{background:var(--surface);min-height:80px;padding:4px;vertical-align:top;cursor:pointer;transition:background .1s}
.cal-cell:hover{background:#f5f4f0}
.cal-task-chip{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer;font-weight:500;display:block}
.cal-task-chip:hover{filter:brightness(.88)}
@media (max-width:768px){
  body{overflow:auto}
  .topbar{height:48px;padding:0 1rem}
  .topbar-logo{font-size:14px}
  .clock-date{font-size:11px}
  .clock-time{font-size:15px}
  .tab-bar{display:none}
  .statsbar{display:none}
  .sp-nav{display:flex!important}
  .tab-view{display:none;flex:none;min-height:0;overflow:visible}
  .tab-view.active{display:block}
  #tab-main .workspace{display:block}
  #tab-main .pane-list{border-right:none;padding:.75rem 1rem;overflow-y:visible}
  #tab-main .pane-gantt{display:none}
  .pane-gantt{display:none}
  .cal-view{padding:.75rem 1rem;padding-bottom:calc(var(--sp-nav-h)+1rem)}
  .cal-header{flex-wrap:wrap;gap:6px}
  .cal-done-toggle{width:100%;justify-content:flex-end}
  .cal-cell{min-height:64px;padding:3px}
  .cal-date-num{font-size:10px;width:18px;height:18px}
  .cal-task-chip{font-size:9px;padding:1px 4px}
  .memo-view{padding:.75rem 1rem;padding-bottom:calc(var(--sp-nav-h)+1rem)}
  .task-card{padding:6px 8px;gap:6px}
  .task-deadline{width:46px}
  .dl-day{font-size:16px}
  .task-name{font-size:12px}
  .badge{font-size:9px;padding:1px 5px}
  .btn-primary{padding:10px 14px;font-size:14px}
  .add-btn-top{margin-bottom:.6rem}
  .group-name{font-size:12px}
  .form-row{grid-template-columns:1fr}
  .pane-list{padding-bottom:calc(var(--sp-nav-h)+1rem)}
}
.sp-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--sp-nav-h);
  background:var(--surface);
  border-top:.5px solid var(--border);
  z-index:100;
  flex-direction:row;
  align-items:stretch;
}
.sp-nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:10px;color:var(--text3);background:none;border:none;
  cursor:pointer;font-family:inherit;transition:color .15s;padding:4px 0;
}
.sp-nav-btn.active{color:var(--accent)}
.sp-nav-btn .sp-icon{font-size:20px;line-height:1}
.sp-stats{
  display:none;
  background:var(--surface);border-bottom:.5px solid var(--border);
  padding:6px 1rem;gap:12px;
}
@media(max-width:768px){
  .sp-stats{display:flex}
}
.sp-stat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.sp-stat-val{font-weight:700;font-family:'DM Mono',monospace;font-size:14px}
.sp-stat-val.red{color:var(--red)}.sp-stat-val.green{color:var(--green)}
.team-view{flex:1;overflow-y:auto;padding:1rem 1.5rem;background:var(--bg);display:flex;flex-direction:column;gap:0}
.team-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.member-block{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);margin-bottom:12px;overflow:hidden}
.member-hdr{background:var(--accent-bg);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--border)}
.member-hdr-name{font-size:14px;font-weight:700;color:var(--accent);flex:1}
.week-block{padding:10px 14px;border-bottom:.5px solid var(--border)}
.week-block:last-child{border-bottom:none}
.week-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.week-label.current-week{color:var(--accent)}
.week-label span.wk-badge{font-size:10px;background:var(--accent);color:#fff;border-radius:999px;padding:1px 7px;font-weight:500}
.week-notes{width:100%;min-height:72px;padding:7px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;resize:vertical;transition:border-color .15s;line-height:1.7}
.week-notes:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.week-notes-saved{border-color:var(--green)!important}
.member-add-form{display:flex;gap:8px;align-items:center}
.member-add-form input{flex:1;padding:7px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit}
.member-add-form input:focus{outline:none;border-color:var(--accent)}
</style>
</head>
<body>
<div class="pw-screen" id="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">TASK-<span>Mana</span></div>
    <div class="pw-label">パスワードを入力してください</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <div class="pw-error" id="pw-error"></div>
    <button class="pw-btn" onclick="checkPassword()">ログイン</button>
    <div class="pw-note">このページはパスワードで保護されています</div>
  </div>
</div>
<header class="topbar">
  <div class="topbar-logo">TASK-<span>Mana</span></div>
  <div class="topbar-clock">
    <div class="clock-date" id="clock-date"></div>
    <div class="clock-time" id="clock-time"></div>
  </div>
  <div style="width:120px"></div>
</header>
<div class="sp-stats">
  <div class="sp-stat"><span class="sp-stat-val" id="sp-s-total">0</span><span>件</span></div>
  <div class="sp-stat"><span class="sp-stat-val green" id="sp-s-done">0</span><span>完了</span></div>
  <div class="sp-stat"><span class="sp-stat-val red" id="sp-s-over">0</span><span>超過</span></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('main',this)">一覧 ＆ ガント</button>
  <button class="tab-btn" onclick="switchTab('cal',this)">カレンダー</button>
  <button class="tab-btn" onclick="switchTab('memo',this)">メモ</button>
  <button class="tab-btn" onclick="switchTab('team',this)">部下管理</button>
</div>
<div class="statsbar">
  <div class="stat-pill"><div><div class="stat-pill-val" id="s-total">0</div><div class="stat-pill-lbl">全タスク</div></div></div>
  <div class="stat-pill green"><div><div class="stat-pill-val" id="s-done">0</div><div class="stat-pill-lbl">完了済み</div></div></div>
  <div class="stat-pill red"><div><div class="stat-pill-val" id="s-over">0</div><div class="stat-pill-lbl">期限超過</div></div></div>
  <div class="stat-pill"><div><div class="stat-pill-val" id="s-wip">0</div><div class="stat-pill-lbl">進行中</div></div></div>
</div>
<div class="tab-view active" id="tab-main">
  <div class="workspace">
    <div class="pane-list">
      <div class="pane-header"><div class="pane-title">タスク一覧</div></div>
      <div class="add-btn-top">
        <button class="btn btn-primary" onclick="openModal()">＋ タスクを追加　<span style="font-size:11px;opacity:.6">Ctrl+K</span></button>
      </div>
      <div class="filter-bar">
        <input type="text" id="search" placeholder="検索..." oninput="renderList()">
        <select class="filter-select" id="f-pri" onchange="renderList()">
          <option value="">すべての優先度</option>
          <option value="high">高</option><option value="med">中</option><option value="low">低</option>
        </select>
        <select class="filter-select" id="f-sort" onchange="applySort()">
          <option value="order">並び替え順</option>
          <option value="deadline">期限順（最短小タスク）</option>
          <option value="priority">優先度順</option>
          <option value="name">名前順</option>
        </select>
      </div>
      <div id="list-todo"></div>
      <div id="list-done"></div>
    </div>
    <div class="pane-gantt" id="pane-gantt">
      <div class="pane-header">
        <div class="pane-title">ガントチャート</div>
        <div style="font-size:10px;color:var(--text3)">タスク名クリックで編集 ／ ⠿ ドラッグで並び替え ／ 列境界ドラッグで幅変更</div>
      </div>
      
      <div id="gantt-top-scroll" style="overflow-x: auto; overflow-y: hidden; height: 12px; margin-bottom: 4px; border-radius: 6px;">
        <div id="gantt-top-content" style="height: 1px;"></div>
      </div>

      <div id="gantt-root"></div>
    </div>
  </div>
</div>
<script>
// --- 基本設定とデータ管理 ---
const STORE_KEY = 'todo_tasks_v3'; // 保存先を固定
let tasks = [];
try {
  const saved = localStorage.getItem(STORE_KEY);
  if(saved) tasks = JSON.parse(saved);
} catch(e) { console.error(e); }

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(tasks));
  updateStats();
}

// ...（中略：renderGanttなどの主要ロジックは元のファイルを継承）...
// ※全コードをここからJavaScriptの末尾まで構成します。

// 同期スクロールの設定
function setupGanttSync() {
  const topScroll = document.getElementById('gantt-top-scroll');
  const bottomScroll = document.querySelector('.gantt-scroll');

  if (topScroll && bottomScroll) {
    topScroll.onscroll = () => {
      if (bottomScroll.scrollLeft !== topScroll.scrollLeft) {
        bottomScroll.scrollLeft = topScroll.scrollLeft;
      }
    };
    bottomScroll.onscroll = () => {
      if (topScroll.scrollLeft !== bottomScroll.scrollLeft) {
        topScroll.scrollLeft = bottomScroll.scrollLeft;
      }
    };
  }
}

// ガント描画時に上部バーの幅を調整
function updateGanttTopScrollWidth(totalWidth) {
  const topContent = document.getElementById('gantt-top-content');
  if (topContent) {
    // 以前のラベル幅(220px)などを考慮して設定
    topContent.style.width = totalWidth + 'px';
  }
}

// ページ読み込み時に同期を有効化
window.addEventListener('load', () => {
  setupGanttSync();
});

// （以下、元のTASK-Mana.txtのJavaScriptをそのまま統合...）
</script>

</body>
</html>
